name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '*.sln'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore PharmPOS.sln

      - name: Build
        run: dotnet build PharmPOS.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/PharmPOS.API --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: pharmpos-prod-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
